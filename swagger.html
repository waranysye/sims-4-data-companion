<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sims 4 Data Companion — API Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #238636, #2ea043);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .navbar-name {
      font-size: 15px;
      font-weight: 700;
      color: #f0f6fc;
    }
    .navbar-sep { color: #30363d; margin: 0 6px; }
    .navbar-section { font-size: 14px; color: #8b949e; font-weight: 500; }

    .nav-chips { display: flex; gap: 8px; align-items: center; }
    .chip {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .chip-live   { background: rgba(35,134,54,0.2);  color: #3fb950; border: 1px solid rgba(35,134,54,0.4); }
    .chip-v      { background: rgba(88,166,255,0.1); color: #58a6ff; border: 1px solid rgba(88,166,255,0.2); }
    .chip-jwt    { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid rgba(210,153,34,0.25); }

    /* ===== SWAGGER WRAPPER ===== */
    #swagger-ui {
      max-width: 1060px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    /* Hide default topbar */
    .swagger-ui .topbar { display: none !important; }

    /* Info */
    .swagger-ui .info { margin: 0 0 28px; }
    .swagger-ui .info .title {
      font-family: 'Inter', sans-serif !important;
      font-size: 1.75rem !important;
      font-weight: 700 !important;
      color: #f0f6fc !important;
    }
    .swagger-ui .info .description p,
    .swagger-ui .info .description li {
      font-family: 'Inter', sans-serif !important;
      font-size: 14px !important;
      color: #8b949e !important;
      line-height: 1.6 !important;
    }
    .swagger-ui .info .description h2 {
      font-family: 'Inter', sans-serif !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #c9d1d9 !important;
      margin: 20px 0 8px !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
    }
    .swagger-ui .info .description code,
    .swagger-ui .info .description pre {
      font-family: 'SFMono-Regular', Consolas, monospace !important;
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
      color: #79c0ff !important;
      font-size: 13px !important;
      padding: 2px 6px !important;
    }
    .swagger-ui .info .description pre { padding: 12px 16px !important; display: block; }

    /* Servers */
    .swagger-ui .servers label,
    .swagger-ui .servers select {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      color: #8b949e !important;
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
    }
    .swagger-ui .scheme-container {
      background: #0d1117 !important;
      box-shadow: none !important;
      border-bottom: 1px solid #21262d !important;
      padding: 16px 0 !important;
      margin-bottom: 20px !important;
    }

    /* Authorize button */
    .swagger-ui .btn.authorize {
      background: #238636 !important;
      border: 1px solid rgba(240,246,252,0.1) !important;
      color: #f0f6fc !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      border-radius: 6px !important;
      padding: 6px 16px !important;
      box-shadow: none !important;
    }
    .swagger-ui .btn.authorize:hover { background: #2ea043 !important; }
    .swagger-ui .btn.authorize svg { fill: #f0f6fc !important; }

    /* Tags */
    .swagger-ui .opblock-tag {
      font-family: 'Inter', sans-serif !important;
      font-size: 16px !important;
      font-weight: 600 !important;
      color: #f0f6fc !important;
      border-bottom: 1px solid #21262d !important;
      padding: 12px 0 !important;
      margin-top: 8px !important;
    }
    .swagger-ui .opblock-tag small {
      font-family: 'Inter', sans-serif !important;
      color: #8b949e !important;
      font-size: 13px !important;
    }

    /* Operation blocks */
    .swagger-ui .opblock {
      border-radius: 8px !important;
      border: 1px solid #21262d !important;
      background: #161b22 !important;
      box-shadow: none !important;
      margin-bottom: 8px !important;
    }
    .swagger-ui .opblock.is-open { border-color: #30363d !important; }
    .swagger-ui .opblock .opblock-summary { padding: 12px 16px !important; }
    .swagger-ui .opblock-summary-description {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      color: #c9d1d9 !important;
    }
    .swagger-ui .opblock-summary-path,
    .swagger-ui .opblock-summary-path__deprecated {
      font-family: 'SFMono-Regular', Consolas, monospace !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #f0f6fc !important;
    }

    /* Method badges */
    .swagger-ui .opblock-summary-method {
      font-family: 'Inter', sans-serif !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      min-width: 70px !important;
      border-radius: 4px !important;
      letter-spacing: 0.5px !important;
    }
    .swagger-ui .opblock-get    { border-left: 3px solid #58a6ff !important; background: rgba(88,166,255,0.04) !important; }
    .swagger-ui .opblock-post   { border-left: 3px solid #3fb950 !important; background: rgba(63,185,80,0.04) !important; }
    .swagger-ui .opblock-put    { border-left: 3px solid #d29922 !important; background: rgba(210,153,34,0.04) !important; }
    .swagger-ui .opblock-delete { border-left: 3px solid #f85149 !important; background: rgba(248,81,73,0.04) !important; }
    .swagger-ui .opblock-get    .opblock-summary-method { background: rgba(88,166,255,0.15) !important;  color: #79c0ff !important; }
    .swagger-ui .opblock-post   .opblock-summary-method { background: rgba(63,185,80,0.15) !important;   color: #56d364 !important; }
    .swagger-ui .opblock-put    .opblock-summary-method { background: rgba(210,153,34,0.15) !important;  color: #e3b341 !important; }
    .swagger-ui .opblock-delete .opblock-summary-method { background: rgba(248,81,73,0.15) !important;   color: #f85149 !important; }

    /* Inner content */
    .swagger-ui .opblock-body { background: #0d1117 !important; }
    .swagger-ui .opblock-section-header {
      background: #161b22 !important;
      border-top: 1px solid #21262d !important;
    }
    .swagger-ui .opblock-section-header label,
    .swagger-ui .opblock-section-header h4 {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      color: #8b949e !important;
      text-transform: uppercase !important;
      letter-spacing: 0.8px !important;
    }

    /* Description in expanded block */
    .swagger-ui .opblock-description-wrapper p,
    .swagger-ui .markdown p,
    .swagger-ui .markdown li {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      color: #8b949e !important;
      line-height: 1.6 !important;
    }

    /* Parameters table */
    .swagger-ui table thead tr th,
    .swagger-ui .parameters-col_name,
    .swagger-ui .parameter__name {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      color: #8b949e !important;
    }
    .swagger-ui table tbody tr td,
    .swagger-ui .parameter__type,
    .swagger-ui .parameter__in {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      color: #c9d1d9 !important;
      background: transparent !important;
    }
    .swagger-ui table { border-collapse: collapse !important; }
    .swagger-ui table tbody tr { border-bottom: 1px solid #21262d !important; }

    /* Labels */
    .swagger-ui label {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      color: #8b949e !important;
    }
    .swagger-ui .required { color: #f85149 !important; }

    /* Inputs */
    .swagger-ui input[type=text],
    .swagger-ui textarea,
    .swagger-ui select {
      font-family: 'SFMono-Regular', Consolas, monospace !important;
      font-size: 13px !important;
      background: #0d1117 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
      color: #c9d1d9 !important;
      padding: 8px 12px !important;
    }
    .swagger-ui input[type=text]:focus,
    .swagger-ui textarea:focus { border-color: #58a6ff !important; outline: none !important; box-shadow: 0 0 0 3px rgba(88,166,255,0.1) !important; }

    /* Try it out button */
    .swagger-ui .btn.try-out__btn {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      border: 1px solid #30363d !important;
      color: #c9d1d9 !important;
      border-radius: 6px !important;
      background: transparent !important;
    }
    .swagger-ui .btn.try-out__btn:hover { background: #21262d !important; }
    .swagger-ui .btn.try-out__btn.cancel { border-color: #f85149 !important; color: #f85149 !important; }

    /* Execute button */
    .swagger-ui .btn.execute {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      background: #238636 !important;
      border: 1px solid rgba(240,246,252,0.1) !important;
      color: #f0f6fc !important;
      border-radius: 6px !important;
      padding: 7px 18px !important;
    }
    .swagger-ui .btn.execute:hover { background: #2ea043 !important; }

    /* Response section */
    .swagger-ui .responses-wrapper { background: #0d1117 !important; }
    .swagger-ui .response-col_status {
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
      font-size: 13px !important;
      color: #c9d1d9 !important;
    }
    .swagger-ui .response-col_description {
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      color: #8b949e !important;
    }
    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5 {
      font-family: 'Inter', sans-serif !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      color: #8b949e !important;
      text-transform: uppercase !important;
      letter-spacing: 0.8px !important;
    }

    /* Code highlight */
    .swagger-ui .highlight-code .microlight,
    .swagger-ui .curl-command .microlight {
      font-family: 'SFMono-Regular', Consolas, monospace !important;
      font-size: 12px !important;
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
      color: #c9d1d9 !important;
      padding: 12px !important;
    }

    /* Copy button */
    .swagger-ui .copy-to-clipboard {
      background: #21262d !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
    }

    /* Model / Schema */
    .swagger-ui section.models { border: 1px solid #21262d !important; border-radius: 8px !important; background: #161b22 !important; }
    .swagger-ui section.models .model-container { background: #0d1117 !important; border-radius: 6px !important; margin: 8px !important; }
    .swagger-ui .model-title { font-family: 'Inter', sans-serif !important; font-weight: 600 !important; color: #f0f6fc !important; }
    .swagger-ui .model, .swagger-ui .model * { font-family: 'SFMono-Regular', Consolas, monospace !important; font-size: 12px !important; color: #c9d1d9 !important; }
    .swagger-ui .prop-type { color: #79c0ff !important; }
    .swagger-ui .prop-format { color: #56d364 !important; }

    /* Search/filter */
    .swagger-ui .filter-container { background: #0d1117 !important; border-bottom: 1px solid #21262d !important; padding: 12px 24px !important; }
    .swagger-ui .filter-container .operation-filter-input {
      font-family: 'Inter', sans-serif !important;
      background: #161b22 !important;
      border: 1px solid #30363d !important;
      border-radius: 6px !important;
      color: #c9d1d9 !important;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-brand">
      <div class="navbar-logo">🐚</div>
      <span class="navbar-name">sims-4-data-companion</span>
      <span class="navbar-sep">/</span>
      <span class="navbar-section">API Reference</span>
    </div>
    <div class="nav-chips">
      <span class="chip chip-live">● Live</span>
      <span class="chip chip-v">v2.0.0</span>
      <span class="chip chip-jwt">🔒 JWT</span>
    </div>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: '/api-contract.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIBundle.SwaggerUIStandalonePreset
        ],
        layout: 'BaseLayout',
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: 'list',
        filter: true,
        tryItOutEnabled: false,
      });
    };
  </script>
</body>
</html>
