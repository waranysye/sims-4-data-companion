openapi: 3.0.3
info:
  title: Sims 4 DaaS (Data as a Service) Companion API
  description: API Contract untuk menyajikan rekomendasi kecocokan antara Karier dan Sifat (Traits) di The Sims 4. Dibuat khusus untuk kebutuhan Data Platform Intern tiket.com.
  version: 1.0.0
servers:
  - url: http://localhost:8888/api/v1
    description: Local Development Server

paths:
  /recommendations:
    get:
      summary: Mengambil semua data rekomendasi karir dan trait
      description: Endpoint ini mengembalikan daftar kombinasi karier, cabang karier, gaji, emosi ideal, dan kecocokan sifat berdasarkan database.
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        career_name:
                          type: string
                          example: Tech Guru
                        branch:
                          type: string
                          example: Startup Entrepreneur
                        base_salary:
                          type: integer
                          example: 51
                        ideal_mood:
                          type: string
                          example: Focused
                        trait_name:
                          type: string
                          example: Genius
                        compatibility_score:
                          type: integer
                          example: 5
                        reason:
                          type: string
                          example: Sifat Genius sangat membantu mempertahankan mood Focused saat coding.
        '500':
          description: Terjadi kesalahan pada server internal
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Gagal mengambil data platform.
    post:
      summary: Menambahkan data kecocokan karier dan trait baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - career_id
                - trait_id
                - compatibility_score
                - reason
              properties:
                career_id:
                  type: integer
                  example: 1
                trait_id:
                  type: integer
                  example: 2
                compatibility_score:
                  type: integer
                  example: 5
                reason:
                  type: string
                  example: Cocok sekali untuk mempercepat skill programming.
      responses:
        '201':
          description: Berhasil menambahkan data

  /recommendations/{career_id}/{trait_id}:
    put:
      summary: Mengubah data skor atau alasan kecocokan
      parameters:
        - in: path
          name: career_id
          required: true
          schema:
            type: integer
        - in: path
          name: trait_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                compatibility_score:
                  type: integer
                  example: 4
                reason:
                  type: string
                  example: Update skor karena balancing dari expansion terbaru.
      responses:
        '200':
          description: Berhasil mengubah data
    delete:
      summary: Menghapus kecocokan karier dan trait
      parameters:
        - in: path
          name: career_id
          required: true
          schema:
            type: integer
        - in: path
          name: trait_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Berhasil menghapus data