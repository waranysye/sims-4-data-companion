<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sims 4 Data Companion Engine 💎</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-green-400 mb-2">💎 Sims 4 Data Companion</h1>
            <p class="text-gray-400">A Full-Stack Data-as-a-Service (DaaS) Application for Game Analytics</p>
        </header>

        <div class="bg-gray-800 rounded-lg shadow-xl overflow-hidden p-6 border border-gray-700">
            <h2 class="text-xl font-bold text-white mb-4">📊 Career & Trait Compatibility Matrix</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full text-left text-sm text-gray-300">
                    <thead class="bg-gray-700 text-xs uppercase text-gray-400 font-semibold">
                        <tr>
                            <th class="px-6 py-3">Career Name</th>
                            <th class="px-6 py-3">Branch</th>
                            <th class="px-6 py-3">Salary/Hour</th>
                            <th class="px-6 py-3">Ideal Mood</th>
                            <th class="px-6 py-3">Recommended Trait</th>
                            <th class="px-6 py-3 text-center">Score</th>
                            <th class="px-6 py-3">Reason</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="divide-y divide-gray-700">
                        <tr>
                            <td colspan="7" class="px-6 py-4 text-center text-gray-500 animate-pulse">Memuat data dari Data Platform Golang...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchSimsData() {
            try {
                const response = await fetch('http://localhost:8080/api/v1/recommendations');
                const result = await response.json();
                
                const tableBody = document.getElementById('data-table-body');
                tableBody.innerHTML = ''; 

                if (result.status === 'success' && result.data) {
                    result.data.forEach(item => {
                        const row = `
                            <tr class="hover:bg-gray-750 transition-colors">
                                <td class="px-6 py-4 font-medium text-white">${item.career_name}</td>
                                <td class="px-6 py-4">${item.branch}</td>
                                <td class="px-6 py-4 text-green-400 font-bold">§ ${item.base_salary}</td>
                                <td class="px-6 py-4"><span class="bg-blue-900 text-blue-200 text-xs px-2 py-1 rounded-full font-medium">${item.ideal_mood}</span></td>
                                <td class="px-6 py-4 font-semibold text-amber-400">${item.trait_name}</td>
                                <td class="px-6 py-4 text-center"><span class="bg-green-900 text-green-200 px-2 py-1 rounded text-xs font-bold">${item.compatibility_score}/5</span></td>
                                <td class="px-6 py-4 text-xs text-gray-400 max-w-xs">${item.reason}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });
                }
            } catch (error) {
                console.error("Gagal mengambil data:", error);
                document.getElementById('data-table-body').innerHTML = `
                    <tr>
                        <td colspan="7" class="px-6 py-4 text-center text-red-400 font-bold">❌ Gagal terhubung ke Server API Golang. Pastikan server go sudah dinyalakan!</td>
                    </tr>
                `;
            }
        }

        fetchSimsData();
    </script>
</body>
</html>
